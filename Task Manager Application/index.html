<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="top-bar">

            <h1>Task Manager</h1>

            <button id="themeBtn">
                🌙 Theme
            </button>

        </div>

        <form id="taskForm">

            <input
                type="text"
                id="taskTitle"
                placeholder="Enter Task"
                required
            >

            <select id="category">

                <option value="Study">
                    Study
                </option>

                <option value="Work">
                    Work
                </option>

                <option value="Personal">
                    Personal
                </option>

            </select>

            <button type="submit">
                Add Task
            </button>

        </form>

        <div id="taskContainer"></div>

    </div>

    <script src="script.js"></script>

</body>
</html>
